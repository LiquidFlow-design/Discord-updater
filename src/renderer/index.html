<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';"/>
  <title>Discord Updater</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag">
      <div class="titlebar-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="#5865F2"/></svg>
      </div>
      <span class="titlebar-title">Discord Updater</span>
      <span class="app-update-dot" id="app-update-dot" style="display:none" title="App-Update verfügbar">●</span>
    </div>
    <div class="titlebar-controls">
      <button class="tb-btn tb-minimize" id="btn-minimize"><svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg></button>
      <button class="tb-btn tb-close" id="btn-close"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    </div>
  </div>

  <div class="crash-banner" id="crash-banner" style="display:none">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span id="crash-banner-text" data-i18n="crash_detected"></span>
    <div class="crash-banner-actions">
      <button class="btn btn-sm btn-primary" id="btn-crash-repair" data-i18n="crash_repair_btn"></button>
      <button class="btn btn-sm btn-ghost" id="btn-crash-dismiss">×</button>
    </div>
  </div>

  <div class="app-update-progress-bar" id="app-update-progress-bar" style="display:none">
    <div class="spinner" style="width:12px;height:12px;border-width:2px"></div>
    <span id="app-update-progress-text"></span>
  </div>

  <div class="app-layout">
    <nav class="sidebar">
      <div class="nav-items">
        <button class="nav-item active" data-page="dashboard"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span data-i18n="nav_dashboard"></span></button>
        <button class="nav-item" data-page="updates"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg><span data-i18n="nav_updates"></span></button>
        <button class="nav-item" data-page="backups"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span data-i18n="nav_backups"></span></button>
        <button class="nav-item" data-page="instances"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><span data-i18n="nav_instances"></span></button>
        <button class="nav-item" data-page="repair"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg><span data-i18n="nav_repair"></span></button>
        <button class="nav-item" data-page="history"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span data-i18n="nav_history"></span></button>
        <button class="nav-item" data-page="notifications"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span data-i18n="nav_notifications"></span></button>
        <button class="nav-item" data-page="settings"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span data-i18n="nav_settings"></span></button>
      </div>
      <div class="sidebar-footer">
        <div class="status-dot" id="status-dot"></div>
        <button class="theme-toggle-btn" id="btn-theme-toggle">
          <svg id="theme-icon-dark" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="theme-icon-light" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </nav>

    <main class="content">

      <!-- ── DASHBOARD ── -->
      <section class="page active" id="page-dashboard">
        <div class="page-header"><h1 class="page-title" data-i18n="dash_title"></h1><p class="page-subtitle" data-i18n="dash_subtitle"></p></div>
        <div class="cards-grid">
          <div class="card">
            <div class="card-header">
              <div class="card-icon discord-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg></div>
              <div class="card-title-group"><h3>Discord</h3><span class="badge" id="discord-badge">–</span></div>
            </div>
            <div class="card-body">
              <div class="info-row"><span class="info-label" data-i18n="dash_version"></span><span class="info-value" id="discord-version">–</span></div>
              <div class="info-row"><span class="info-label" data-i18n="dash_path"></span><span class="info-value info-path" id="discord-path">–</span></div>
            </div>
            <div class="card-actions">
              <button class="btn btn-primary btn-sm" id="btn-launch-discord" data-i18n="dash_launch"></button>
              <button class="btn btn-ghost btn-sm" id="btn-update-discord-dash" data-i18n="dash_update"></button>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-icon bd-icon"><svg width="22" height="22" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#3E82E5" opacity="0.15"/><text x="50" y="65" text-anchor="middle" font-size="42" font-weight="bold" fill="#3E82E5">B</text></svg></div>
              <div class="card-title-group"><h3>BetterDiscord</h3><span class="badge" id="bd-badge">–</span></div>
            </div>
            <div class="card-body">
              <div class="info-row"><span class="info-label" data-i18n="dash_version"></span><span class="info-value" id="bd-version">–</span></div>
              <div class="info-row"><span class="info-label" data-i18n="dash_path"></span><span class="info-value info-path" id="bd-path">–</span></div>
            </div>
            <div class="card-actions">
              <button class="btn btn-primary btn-sm" id="btn-update-bd-dash" data-i18n="dash_update"></button>
              <button class="btn btn-ghost btn-sm" onclick="window.api.openExternal('https://betterdiscord.app/')" data-i18n="dash_website"></button>
            </div>
          </div>
        </div>

        <div class="section-block">
          <div class="section-header-row"><h2 class="section-title" data-i18n="dash_quicklinks"></h2></div>
          <div class="quick-links-grid" id="quick-links-grid"></div>
        </div>

        <div class="section-block">
          <div class="section-header-row" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <h2 class="section-title" data-i18n="dash_fav_servers"></h2>
            <button class="btn btn-ghost btn-sm" id="btn-add-server">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span data-i18n="dash_fav_add"></span>
            </button>
          </div>
          <div class="servers-grid" id="servers-grid"><div class="server-empty" data-i18n="dash_fav_empty"></div></div>
        </div>

        <div class="section-block">
          <div class="section-header-row"><h2 class="section-title" data-i18n="dash_quickactions"></h2></div>
          <div class="quick-actions">
            <button class="quick-action-btn" id="btn-check-updates"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg><span data-i18n="dash_check_updates"></span></button>
            <button class="quick-action-btn" id="btn-quick-backup"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span data-i18n="dash_backup_now"></span></button>
            <button class="quick-action-btn" onclick="switchPage('repair')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg><span data-i18n="dash_repair"></span></button>
            <button class="quick-action-btn" onclick="switchPage('instances')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><span data-i18n="dash_instances"></span></button>
          </div>
        </div>
        <div class="last-check-bar"><span class="last-check-label" data-i18n="dash_last_check"></span><span id="last-check-time">–</span></div>
      </section>

      <!-- ── UPDATES ── -->
      <section class="page" id="page-updates">
        <div class="page-header"><h1 class="page-title" data-i18n="upd_title"></h1><p class="page-subtitle" data-i18n="upd_subtitle"></p></div>
        <div class="update-check-bar">
          <button class="btn btn-primary btn-sm" id="btn-check-updates-page"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg><span data-i18n="upd_check_btn"></span></button>
          <span class="check-time-label"><span data-i18n="upd_last_check"></span> <span id="upd-last-check">–</span></span>
        </div>
        <div class="update-panel">
          <div class="update-item">
            <div class="update-item-left">
              <div class="update-app-icon discord-icon-lg"><svg width="28" height="28" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg></div>
              <div>
                <h3>Discord</h3>
                <div class="version-row"><span class="version-label" data-i18n="upd_installed"></span><span class="version-val" id="upd-discord-ver">–</span></div>
                <div class="version-row"><span class="version-label" data-i18n="upd_current"></span><span class="version-val version-muted" id="upd-discord-managed" data-i18n="upd_managed"></span></div>
              </div>
            </div>
            <div class="update-item-right"><span class="badge" id="upd-discord-badge">–</span><button class="btn btn-primary" id="btn-update-discord" data-i18n="upd_discord_start"></button></div>
          </div>
          <div class="update-divider"></div>
          <div class="update-item">
            <div class="update-item-left">
              <div class="update-app-icon bd-icon-lg"><svg width="28" height="28" viewBox="0 0 100 100"><text x="50" y="72" text-anchor="middle" font-size="60" font-weight="900" fill="#3E82E5">B</text></svg></div>
              <div>
                <h3>BetterDiscord</h3>
                <div class="version-row"><span class="version-label" data-i18n="upd_installed"></span><span class="version-val" id="upd-bd-ver">–</span></div>
                <div class="version-row"><span class="version-label" data-i18n="upd_latest"></span><span class="version-val version-muted" id="upd-bd-latest" data-i18n="upd_checking"></span></div>
              </div>
            </div>
            <div class="update-item-right"><span class="badge" id="upd-bd-badge">–</span><button class="btn btn-primary" id="btn-update-bd" data-i18n="upd_bd_install"></button></div>
          </div>
        </div>
        <div class="bd-progress-box" id="bd-progress-box" style="display:none">
          <div class="bd-progress-header"><div class="spinner"></div><span id="bd-progress-text" data-i18n="prog_bd_updating"></span></div>
          <div class="bd-progress-steps" id="bd-progress-steps"></div>
        </div>
        <div class="info-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p data-i18n="upd_info"></p></div>
        <div class="auto-update-toggle">
          <div><h4 data-i18n="upd_auto_toggle_h"></h4><p data-i18n="upd_auto_toggle_p"></p></div>
          <label class="toggle"><input type="checkbox" id="toggle-auto-bd"><span class="toggle-slider"></span></label>
        </div>
      </section>

      <!-- ── BACKUPS ── -->
      <section class="page" id="page-backups">
        <div class="page-header"><h1 class="page-title" data-i18n="bak_title"></h1><p class="page-subtitle" data-i18n="bak_subtitle"></p></div>
        <div class="backup-action-bar">
          <button class="btn btn-primary btn-sm" id="btn-create-backup"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span data-i18n="bak_create"></span></button>
          <button class="btn btn-ghost btn-sm" id="btn-refresh-backups"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.9"/></svg><span data-i18n="bak_refresh"></span></button>
        </div>
        <div class="bd-progress-box" id="rollback-progress-box" style="display:none">
          <div class="bd-progress-header"><div class="spinner"></div><span id="rollback-progress-text" data-i18n="prog_rollback"></span></div>
          <div class="bd-progress-steps" id="rollback-progress-steps"></div>
        </div>
        <div class="info-box" style="margin-bottom:16px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p data-i18n="bak_info"></p></div>
        <div class="backup-list" id="backup-list"><div class="history-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><p data-i18n="bak_empty"></p></div></div>
      </section>

      <!-- ── INSTANZEN ── -->
      <section class="page" id="page-instances">
        <div class="page-header"><h1 class="page-title" data-i18n="inst_title"></h1><p class="page-subtitle" data-i18n="inst_subtitle"></p></div>
        <div class="instances-grid" id="instances-grid"><div class="history-empty"><div class="spinner"></div></div></div>
      </section>

      <!-- ── REPARATUR ── -->
      <section class="page" id="page-repair">
        <div class="page-header"><h1 class="page-title" data-i18n="rep_title"></h1><p class="page-subtitle" data-i18n="rep_subtitle"></p></div>
        <div class="repair-grid">
          <div class="repair-card"><div class="repair-card-icon" style="color:#5865F2"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div><h3 data-i18n="rep_discord_h"></h3><p data-i18n="rep_discord_p"></p><button class="btn btn-primary" id="btn-repair-discord" data-i18n="rep_discord_btn"></button></div>
          <div class="repair-card"><div class="repair-card-icon" style="color:#3E82E5"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.9"/></svg></div><h3 data-i18n="rep_bd_h"></h3><p data-i18n="rep_bd_p"></p><button class="btn btn-secondary" onclick="window.api.openExternal('https://betterdiscord.app/')" data-i18n="rep_bd_btn"></button></div>
          <div class="repair-card"><div class="repair-card-icon" style="color:#ED4245"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div><h3 data-i18n="rep_reinstall_h"></h3><p data-i18n="rep_reinstall_p"></p><button class="btn btn-danger" onclick="window.api.openExternal('https://discord.com/download')" data-i18n="rep_reinstall_btn"></button></div>
          <div class="repair-card"><div class="repair-card-icon" style="color:#FEE75C"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><h3 data-i18n="rep_support_h"></h3><p data-i18n="rep_support_p"></p><button class="btn btn-ghost" onclick="window.api.openExternal('https://discord.gg/0Tmfo5ZbORCRqbAd')" data-i18n="rep_support_btn"></button></div>
        </div>
        <div class="repair-status" id="repair-status" style="display:none"><div class="spinner"></div><span id="repair-status-text"></span></div>
      </section>

      <!-- ── VERLAUF ── -->
      <section class="page" id="page-history">
        <div class="page-header"><h1 class="page-title" data-i18n="hist_title"></h1><p class="page-subtitle" data-i18n="hist_subtitle"></p></div>
        <div class="history-toolbar">
          <button class="btn btn-ghost btn-sm" id="btn-clear-history" data-i18n="hist_clear"></button>
          <button class="btn btn-ghost btn-sm" id="btn-refresh-history"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.9"/></svg><span data-i18n="hist_refresh"></span></button>
        </div>
        <div class="history-list" id="history-list"><div class="history-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p data-i18n="hist_empty"></p></div></div>
      </section>

      <!-- ── BENACHRICHTIGUNGEN ── -->
      <section class="page" id="page-notifications">
        <div class="page-header"><h1 class="page-title" data-i18n="notif_title"></h1><p class="page-subtitle" data-i18n="notif_subtitle"></p></div>
        <div class="history-toolbar">
          <button class="btn btn-ghost btn-sm" id="btn-clear-notif-log" data-i18n="notif_clear"></button>
          <button class="btn btn-ghost btn-sm" id="btn-refresh-notif-log"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.9"/></svg><span data-i18n="notif_refresh"></span></button>
        </div>
        <div class="history-list" id="notif-log-list"><div class="history-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><p data-i18n="notif_empty"></p></div></div>
      </section>

      <!-- ── EINSTELLUNGEN ── -->
      <section class="page" id="page-settings">
        <div class="page-header"><h1 class="page-title" data-i18n="set_title"></h1><p class="page-subtitle" data-i18n="set_subtitle"></p></div>

        <div class="settings-group">
          <h3 class="settings-group-title" data-i18n="set_group_general"></h3>
          <div class="settings-item"><div class="settings-item-info"><h4 data-i18n="set_autostart_h"></h4><p data-i18n="set_autostart_p"></p></div><label class="toggle"><input type="checkbox" id="setting-autostart"><span class="toggle-slider"></span></label></div>
          <div class="settings-item"><div class="settings-item-info"><h4 data-i18n="set_tray_h"></h4><p data-i18n="set_tray_p"></p></div><label class="toggle"><input type="checkbox" id="setting-minimize-tray"><span class="toggle-slider"></span></label></div>
          <div class="settings-item settings-item-select"><div class="settings-item-info"><h4 data-i18n="set_theme_h"></h4><p data-i18n="set_theme_p"></p></div>
            <select class="settings-select" id="setting-theme">
              <option value="dark" data-i18n="set_theme_dark"></option>
              <option value="light" data-i18n="set_theme_light"></option>
            </select>
          </div>
          <div class="settings-item settings-item-select"><div class="settings-item-info"><h4 data-i18n="set_language_h"></h4><p data-i18n="set_language_p"></p></div>
            <select class="settings-select" id="setting-language">
              <option value="de">Deutsch</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>

        <div class="settings-group">
          <h3 class="settings-group-title" data-i18n="set_group_updates"></h3>
          <div class="settings-item"><div class="settings-item-info"><h4 data-i18n="set_notif_h"></h4><p data-i18n="set_notif_p"></p></div><label class="toggle"><input type="checkbox" id="setting-notifications"><span class="toggle-slider"></span></label></div>
          <div class="settings-item"><div class="settings-item-info"><h4 data-i18n="set_autobd_h"></h4><p data-i18n="set_autobd_p"></p></div><label class="toggle"><input type="checkbox" id="setting-auto-bd"><span class="toggle-slider"></span></label></div>
          <div class="settings-item settings-item-select"><div class="settings-item-info"><h4 data-i18n="set_interval_h"></h4><p data-i18n="set_interval_p"></p></div>
            <select class="settings-select" id="setting-interval">
              <option value="15" data-i18n="set_int_15"></option>
              <option value="30" data-i18n="set_int_30"></option>
              <option value="60" data-i18n="set_int_60"></option>
              <option value="120" data-i18n="set_int_120"></option>
              <option value="360" data-i18n="set_int_360"></option>
            </select>
          </div>
        </div>

        <div class="settings-group">
          <h3 class="settings-group-title" data-i18n="set_group_crash"></h3>
          <div class="settings-item"><div class="settings-item-info"><h4 data-i18n="set_crash_h"></h4><p data-i18n="set_crash_p"></p></div><label class="toggle"><input type="checkbox" id="setting-crash-detection"><span class="toggle-slider"></span></label></div>
          <div class="settings-item"><div class="settings-item-info"><h4 data-i18n="set_autorepair_h"></h4><p data-i18n="set_autorepair_p"></p></div><label class="toggle"><input type="checkbox" id="setting-auto-repair"><span class="toggle-slider"></span></label></div>
        </div>

        <div class="settings-group">
          <h3 class="settings-group-title" data-i18n="set_group_backups"></h3>
          <div class="settings-item settings-item-select"><div class="settings-item-info"><h4 data-i18n="set_maxbak_h"></h4><p data-i18n="set_maxbak_p"></p></div>
            <select class="settings-select" id="setting-max-backups">
              <option value="3" data-i18n="set_bak_3"></option>
              <option value="5" data-i18n="set_bak_5"></option>
              <option value="10" data-i18n="set_bak_10"></option>
              <option value="20" data-i18n="set_bak_20"></option>
            </select>
          </div>
        </div>

        <div class="settings-group">
          <h3 class="settings-group-title" data-i18n="set_group_info"></h3>
          <div class="settings-info-row">
            <span data-i18n="set_version"></span>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="info-val" id="app-version-display">1.0.2</span>
              <span class="badge" id="app-update-badge" style="display:none"></span>
            </div>
          </div>
          <div class="settings-info-row" id="app-update-row" style="display:none">
            <div><div style="font-size:13px;font-weight:500" id="app-update-label"></div><div style="font-size:12px;color:var(--text-muted);margin-top:2px" id="app-update-desc"></div></div>
            <button class="btn btn-primary btn-sm" id="btn-install-app-update" data-i18n="app_upd_install"></button>
          </div>
          <div class="settings-info-row"><span data-i18n="set_github"></span><button class="btn-link" onclick="window.api.openExternal('https://github.com/LiquidFlow-design/Discord-updater')" data-i18n="set_github_btn"></button></div>
          <div class="settings-info-row"><span data-i18n="set_bd_link"></span><button class="btn-link" onclick="window.api.openExternal('https://betterdiscord.app/')">betterdiscord.app</button></div>
        </div>

        <button class="btn btn-danger btn-sm" id="btn-quit" style="margin-top:8px" data-i18n="set_quit"></button>
      </section>

    </main>
  </div>

  <!-- Server Modal -->
  <div class="modal-overlay" id="server-modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header"><h3 id="modal-title" data-i18n="modal_add_title"></h3><button class="tb-btn" id="btn-modal-close"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button></div>
      <div class="modal-body">
        <input type="hidden" id="modal-server-id">
        <div class="form-row"><label class="form-label" data-i18n="modal_name_label"></label><input type="text" class="form-input" id="modal-server-name" data-i18n-ph="modal_name_ph" maxlength="40"></div>
        <div class="form-row"><label class="form-label"><span data-i18n="modal_id_label"></span> <span class="form-hint" data-i18n="modal_id_hint"></span></label><input type="text" class="form-input" id="modal-server-id-val" data-i18n-ph="modal_id_ph" maxlength="25"><span class="form-hint-text" data-i18n="modal_id_hint2"></span></div>
        <div class="form-row"><label class="form-label" data-i18n="modal_color_label"></label>
          <div class="color-picker" id="color-picker">
            <button class="color-swatch active" data-color="#5865F2" style="background:#5865F2"></button>
            <button class="color-swatch" data-color="#23a55a" style="background:#23a55a"></button>
            <button class="color-swatch" data-color="#f0b232" style="background:#f0b232"></button>
            <button class="color-swatch" data-color="#ED4245" style="background:#ED4245"></button>
            <button class="color-swatch" data-color="#3E82E5" style="background:#3E82E5"></button>
            <button class="color-swatch" data-color="#eb459e" style="background:#eb459e"></button>
            <button class="color-swatch" data-color="#80848e" style="background:#80848e"></button>
          </div>
        </div>
        <div class="form-row"><label class="form-label"><span data-i18n="modal_emoji_label"></span> <span class="form-hint" data-i18n="modal_emoji_hint"></span></label><input type="text" class="form-input form-input-sm" id="modal-server-emoji" data-i18n-ph="modal_emoji_ph" maxlength="4"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" id="btn-modal-cancel" data-i18n="modal_cancel"></button>
        <button class="btn btn-primary btn-sm" id="btn-modal-save" data-i18n="modal_save"></button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"><span id="toast-msg"></span></div>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
